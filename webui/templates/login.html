<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — MTProtoSERVER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1923; color: #e8edf2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #1e2d3d; border: 1px solid #2c3e50; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; color: #3498db; margin-bottom: 8px; font-size: 24px; }
        .login-box p { text-align: center; color: #8b9dc3; margin-bottom: 24px; font-size: 14px; }
        .input { width: 100%; padding: 12px 16px; border: 1px solid #2c3e50; border-radius: 8px; background: #0f1923; color: #e8edf2; font-size: 16px; margin-bottom: 16px; }
        .input:focus { outline: none; border-color: #3498db; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3498db; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #2980b9; }
        #error { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 MTProtoSERVER</h1>
        <p>Введите пароль для доступа к панели управления</p>
        <form id="login-form">
            <input type="password" id="password" class="input" placeholder="Пароль" required autofocus>
            <button type="submit" class="btn">Войти</button>
        </form>
        <p id="error"></p>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('password', document.getElementById('password').value);
            const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.status === 'ok') {
                window.location.href = '/';
            } else {
                const err = document.getElementById('error');
                err.style.display = 'block';
                err.textContent = data.message || 'Неверный пароль';
            }
        });
    </script>
</body>
</html>
