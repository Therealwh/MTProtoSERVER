<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MTProtoSERVER{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            {% if has_logo %}
            <img src="/api/system/logo" alt="Logo" class="sidebar-logo">
            {% else %}
            <h1>MTProtoSERVER</h1>
            {% endif %}
            <p class="version">v2.0.0</p>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="nav-icon">📊</span><span data-i18n="dashboard">Дашборд</span>
            </a>
            <a href="/clients" class="nav-link {% if request.url.path == '/clients' %}active{% endif %}">
                <span class="nav-icon">👥</span><span data-i18n="clients">Клиенты</span>
            </a>
            <a href="/nodes" class="nav-link {% if request.url.path == '/nodes' %}active{% endif %}">
                <span class="nav-icon">🖥️</span><span data-i18n="nodes">Ноды</span>
            </a>
            <a href="/stats" class="nav-link {% if request.url.path == '/stats' %}active{% endif %}">
                <span class="nav-icon">📈</span><span data-i18n="stats">Статистика</span>
            </a>
            <a href="/socks5" class="nav-link {% if request.url.path == '/socks5' %}active{% endif %}">
                <span class="nav-icon">🧦</span><span>SOCKS5</span>
            </a>
            <a href="/http-proxy" class="nav-link {% if request.url.path == '/http-proxy' %}active{% endif %}">
                <span class="nav-icon">🌐</span><span>HTTP/HTTPS</span>
            </a>
            <a href="/logs" class="nav-link {% if request.url.path == '/logs' %}active{% endif %}">
                <span class="nav-icon">📋</span><span data-i18n="logs">Логи</span>
            </a>
            <a href="/backup" class="nav-link {% if request.url.path == '/backup' %}active{% endif %}">
                <span class="nav-icon">💾</span><span data-i18n="backup">Бэкап</span>
            </a>
            <a href="/security" class="nav-link {% if request.url.path == '/security' %}active{% endif %}">
                <span class="nav-icon">🛡️</span><span data-i18n="security">Безопасность</span>
            </a>
            <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
                <span class="nav-icon">⚙️</span><span data-i18n="settings">Настройки</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="toggleTheme()" class="theme-btn" title="Toggle theme">🌓</button>
            <button onclick="toggleLang()" class="lang-btn" title="Switch language">
                <span id="current-lang">RU</span>
            </button>
        </div>
    </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
