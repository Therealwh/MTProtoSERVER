<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MTProtoSERVER{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>MTProtoSERVER</h1>
            <p class="version">v1.0.0</p>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="nav-icon">📊</span>
                <span>Дашборд</span>
            </a>
            <a href="/users" class="nav-link {% if request.url.path == '/users' %}active{% endif %}">
                <span class="nav-icon">👥</span>
                <span>Пользователи</span>
            </a>
            <a href="/proxies" class="nav-link {% if request.url.path == '/proxies' %}active{% endif %}">
                <span class="nav-icon">🌐</span>
                <span>Прокси</span>
            </a>
            <a href="/socks5" class="nav-link {% if request.url.path == '/socks5' %}active{% endif %}">
                <span class="nav-icon">🧦</span>
                <span>SOCKS5</span>
            </a>
            <a href="/http-proxy" class="nav-link {% if request.url.path == '/http-proxy' %}active{% endif %}">
                <span class="nav-icon">🌐</span>
                <span>HTTP/HTTPS</span>
            </a>
            <a href="/stats" class="nav-link {% if request.url.path == '/stats' %}active{% endif %}">
                <span class="nav-icon">📈</span>
                <span>Статистика</span>
            </a>
            <a href="/logs" class="nav-link {% if request.url.path == '/logs' %}active{% endif %}">
                <span class="nav-icon">📋</span>
                <span>Логи</span>
            </a>
            <a href="/backup" class="nav-link {% if request.url.path == '/backup' %}active{% endif %}">
                <span class="nav-icon">💾</span>
                <span>Бэкап</span>
            </a>
            <a href="/security" class="nav-link {% if request.url.path == '/security' %}active{% endif %}">
                <span class="nav-icon">🛡️</span>
                <span>Безопасность</span>
            </a>
            <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
                <span class="nav-icon">⚙️</span>
                <span>Настройки</span>
            </a>
            <a href="/diagnostics" class="nav-link {% if request.url.path == '/diagnostics' %}active{% endif %}">
                <span class="nav-icon">🔧</span>
                <span>Диагностика</span>
            </a>
        </nav>
    </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
