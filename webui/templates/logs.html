{% extends "base.html" %}
{% block title %}Логи подключений - MTProtoSERVER{% endblock %}
{% block content %}
<div class="page-header">
    <h2>📋 Логи подключений</h2>
    <p>История подключений к прокси</p>
</div>

<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="margin:0;">📡 Последние подключения</h3>
        <button class="btn btn-primary" onclick="loadLogs()">🔄 Обновить</button>
    </div>
    <div id="logs-container">
        <pre class="log-box" id="logs-box">Загрузка логов...</pre>
    </div>
</div>

<div class="section">
    <h3>🔍 Фильтр</h3>
    <div class="form-inline">
        <select id="log-container" class="input">
            <option value="">Все контейнеры</option>
        </select>
        <input type="number" id="log-lines" value="100" min="10" max="1000" class="input" style="width:80px;">
        <span style="color:var(--text-secondary)">строк</span>
        <button class="btn" onclick="loadLogs()">Загрузить</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadLogs() {
    const box = document.getElementById('logs-box');
    box.textContent = 'Загрузка...';
    try {
        const lines = document.getElementById('log-lines').value || 100;
        const res = await fetch(`/api/system/logs?lines=${lines}`);
        const data = await res.json();
        box.textContent = data.logs || 'Нет логов';
    } catch(e) {
        box.textContent = 'Ошибка загрузки: ' + e.message;
    }
}

// Populate container selector
fetch('/api/status')
    .then(r => r.json())
    .then(data => {
        const sel = document.getElementById('log-container');
        if (data.containers) {
            data.containers.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.name;
                opt.textContent = c.name;
                sel.appendChild(opt);
            });
        }
    });

loadLogs();
setInterval(loadLogs, 30000);
</script>
{% endblock %}
